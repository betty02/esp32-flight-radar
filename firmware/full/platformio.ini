; PlatformIO Project Configuration
; ESP32 Flight Radar - Full Standalone Edition v2.1
;
; Features:
;   - Three pages: Clock | Radar | Settings (rotary encoder navigation)
;   - WiFi captive portal (hold button on boot)
;   - Battery level monitoring (ADC with voltage divider)
;   - Backlight brightness control (long-press encoder)
;   - NTP time sync
;   - Settings persist to NVS flash

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.1.0

build_flags =
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=15
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

upload_speed = 921600
board_build.partitions = min_spiffs.csv
